<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Punjab Kings | Schedule</title>

  <style>
    :root{
      --text:#eaf0ff;
      --glass: rgba(10, 18, 32, 0.62);
      --border: rgba(255,255,255,0.20);
      --shadow: 0 18px 40px rgba(0,0,0,0.55);
      --pbksRed:#d40000;
      --pbksRedDark:#7f0000;
      --muted: rgba(234,240,255,0.8);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      color: var(--text);
      min-height:100vh;
      background:
        radial-gradient(1200px 500px at 50% 0%, rgba(212,0,0,0.35), transparent 60%),
        linear-gradient(180deg, rgba(0,0,0,0.4), rgba(0,0,0,0.85)),
        url("assets/bg/stadium.jpg");
      background-size: cover;
      background-position:center;
      background-attachment: fixed;
    }

    .wrap{ max-width:1200px; margin:0 auto; padding:20px; }

    .topbar{
      display:flex;
      justify-content:space-between;
      margin-bottom:18px;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn-top{
      padding:10px 14px;
      border-radius:10px;
      background: rgba(2,6,23,0.55);
      border:1px solid var(--border);
      color: var(--text);
      text-decoration:none;
      font-weight:800;
    }

    .header{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
      margin-bottom:15px;
    }

    .logo{
      width:100px;
      height:100px;
      border-radius:15px;
      overflow:hidden;
      background: rgba(255,255,255,0.08);
      box-shadow: var(--shadow);
    }

    .logo img{ width:100%; height:100%; object-fit:cover; }
    .titlebox{text-align:center;}

    .teamname{
      font-size:40px;
      font-weight:1000;
      margin:0;
    }

    .teamname span{ color: var(--pbksRed); }
    .meta{ font-weight:800; opacity:0.85; margin-top:6px; }

    .tabs{
      display:flex;
      justify-content:center;
      gap:10px;
      margin:15px 0;
      flex-wrap:wrap;
    }

    .tab{
      padding:10px 16px;
      border-radius:10px;
      text-decoration:none;
      font-weight:900;
      border:1px solid var(--border);
      background: rgba(2,6,23,0.55);
      color:white;
    }

    .tab.active{
      background: linear-gradient(180deg, var(--pbksRed), var(--pbksRedDark));
    }

    .announce{
      margin-top:18px;
      background: var(--glass);
      border:1px solid rgba(212,0,0,0.4);
      border-radius:14px;
      box-shadow: var(--shadow);
      padding:30px 20px;
      text-align:center;
    }

    .announce h2{
      margin:0 0 12px;
      font-size:30px;
      color:#fee2e2;
    }

    .announce p{
      margin:0;
      font-size:20px;
      font-weight:800;
      color: var(--muted);
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="btn-top" href="pbks.html">Back to Punjab Kings</a>
    <a class="btn-top" href="schedule.html">Refresh</a>
  </div>

  <div class="header">
    <div class="logo">
      <img src="assets/logos/pbks.png" alt="PBKS Logo">
    </div>

    <div class="titlebox">
      <h1 class="teamname">Punjab <span>Kings</span></h1>
      <div class="meta">Schedule | IPL 2026</div>

      <div class="tabs">
        <a class="tab active" href="schedule.html">Schedule</a>
        <a class="tab" href="#">Results</a>
        <a class="tab" href="squad.html">Squad</a>
        <a class="tab" href="stats.html">Stats</a>
      </div>
    </div>
  </div>

  <section class="announce">
    <h2>Schedule Update</h2>
    <p>Schedule to be announced on 5 March. Stay tuned.</p>
  </section>
</div>
</body>
</html>
